name: Deploy Mini-Tiktok

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: mini-tiktok-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
  DEPLOY_PATH: /home/kyy008/projects/tiktok
  RELEASE_NAME: ${{ github.sha }}

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='api-backend/target' \
            --exclude='api-backend/storage/videos/*' \
            --exclude='api-backend/storage/uploads/*' \
            --exclude='auth-backend/target' \
            -czf /tmp/mini-tiktok-release.tgz .
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" "mkdir -p '$DEPLOY_PATH/releases/$RELEASE_NAME'"
          scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" /tmp/mini-tiktok-release.tgz "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/releases/$RELEASE_NAME/release.tgz"

      - name: Build and restart on server
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" "DEPLOY_PATH='$DEPLOY_PATH' RELEASE_NAME='$RELEASE_NAME' bash -s" <<'SCRIPT'
          set -euo pipefail

          cd "$DEPLOY_PATH/releases/$RELEASE_NAME"
          tar -xzf release.tgz
          rm release.tgz

          if [ ! -f "$DEPLOY_PATH/.env.prod" ]; then
            echo "Missing $DEPLOY_PATH/.env.prod on server" >&2
            exit 1
          fi

          ln -sfn "$DEPLOY_PATH/.env.prod" .env.prod

          docker compose --env-file .env.prod -f docker-compose.prod.yml build
          docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans

          ln -sfn "$DEPLOY_PATH/releases/$RELEASE_NAME" "$DEPLOY_PATH/current"
          docker image prune -f
          find "$DEPLOY_PATH/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
            | sort -n \
            | head -n -5 \
            | cut -d' ' -f2- \
            | xargs -r rm -rf
          SCRIPT
