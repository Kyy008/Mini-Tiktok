map $http_x_forwarded_proto $mini_tiktok_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_host $mini_tiktok_forwarded_host {
    default $http_x_forwarded_host;
    "" $http_host;
}

upstream mini_tiktok_frontend {
    server frontend:80;
}

upstream mini_tiktok_api {
    server api-backend:8085;
}

upstream mini_tiktok_auth {
    server auth-backend:9000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 120m;

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $mini_tiktok_forwarded_proto;
    proxy_set_header X-Forwarded-Host $mini_tiktok_forwarded_host;

    location /api/ {
        proxy_pass http://mini_tiktok_api;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /oauth2/ {
        proxy_pass http://mini_tiktok_auth;
    }

    location /.well-known/ {
        proxy_pass http://mini_tiktok_auth;
    }

    location = /login {
        proxy_pass http://mini_tiktok_auth;
    }

    location = /register {
        proxy_pass http://mini_tiktok_auth;
    }

    location = /logout {
        proxy_pass http://mini_tiktok_auth;
    }

    location = /error {
        proxy_pass http://mini_tiktok_auth;
    }

    location / {
        proxy_pass http://mini_tiktok_frontend;
    }
}
