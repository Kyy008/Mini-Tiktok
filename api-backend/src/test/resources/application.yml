spring:
  datasource:
    url: jdbc:h2:mem:api_backend_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000
          jwk-set-uri: http://localhost:9000/oauth2/jwks

auth-backend:
  base-url: http://localhost:9000

oauth2:
  client-id: tiktok-web
  redirect-uri: http://localhost:5173/oauth/callback
  scopes:
    - video:read
    - video:write
    - video:like
