services:
  mysql:
    image: mysql:8.4
    container_name: mini-tiktok-prod-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: mini_tiktok_auth
      MYSQL_USER: ${MYSQL_USER:-mini_tiktok}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mini_tiktok_prod_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  auth-backend:
    build:
      context: ./auth-backend
      dockerfile: Dockerfile.release
    container_name: mini-tiktok-prod-auth
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mini_tiktok_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-mini_tiktok}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      APP_FRONTEND_BASE_URL: ${PUBLIC_ORIGIN:-http://localhost:8088}
      APP_OAUTH2_ISSUER: ${PUBLIC_ORIGIN:-http://localhost:8088}
      APP_OAUTH2_CLIENT_REDIRECT_URI: ${PUBLIC_ORIGIN:-http://localhost:8088}/oauth/callback

  api-backend:
    build:
      context: ./api-backend
      dockerfile: Dockerfile.release
    container_name: mini-tiktok-prod-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      auth-backend:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mini_tiktok_api?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-mini_tiktok}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${PUBLIC_ORIGIN:-http://localhost:8088}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-backend:9000/oauth2/jwks
      VIDEO_STORAGE_DIR: /data/videos
      VIDEO_TEMP_DIR: /data/uploads
      APP_CORS_ALLOWED_ORIGINS_0: ${PUBLIC_ORIGIN:-http://localhost:8088}
    volumes:
      - mini_tiktok_prod_video_data:/data/videos
      - mini_tiktok_prod_upload_data:/data/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.release
    container_name: mini-tiktok-prod-frontend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: mini-tiktok-prod-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - api-backend
      - auth-backend
    ports:
      - "${HTTP_PORT:-8088}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mini_tiktok_prod_mysql_data:
  mini_tiktok_prod_video_data:
  mini_tiktok_prod_upload_data:
