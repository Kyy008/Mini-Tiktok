server:
  port: 9000

spring:
  application:
    name: auth-backend
  datasource:
    url: jdbc:mysql://localhost:3307/mini_tiktok_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: mini_tiktok
    password: mini_tiktok123
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  thymeleaf:
    cache: false
    check-template-location: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: mini-tiktok-auth
      paths-to-match: /**
      packages-to-scan: com.minitiktok.auth.controller

logging:
  level:
    root: info
    com.minitiktok.auth: debug
    org.springframework.security: info

app:
  frontend:
    base-url: http://localhost:5173
  cors:
    allowed-origins:
      - http://localhost:5173
    allowed-methods:
      - GET
      - POST
      - OPTIONS
    allowed-headers:
      - Content-Type
      - Authorization
