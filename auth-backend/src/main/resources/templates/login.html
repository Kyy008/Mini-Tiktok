<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini-Tiktok Login</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        main {
            width: min(420px, calc(100vw - 32px));
            padding: 32px;
            border: 1px solid #dde3ee;
            border-radius: 8px;
            background: #ffffff;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 24px;
            font-size: 24px;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: 700;
        }

        input {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            border: 1px solid #cfd7e6;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        button, a.button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            margin-top: 20px;
            padding: 0 16px;
            border: 0;
            border-radius: 6px;
            background: #111827;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        a.button {
            margin-left: 8px;
            background: #e5e7eb;
            color: #111827;
        }

        .message {
            margin: 0 0 16px;
            padding: 10px 12px;
            border-radius: 6px;
            background: #e8f5e9;
            color: #166534;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
<main>
    <h1>Mini-Tiktok Login</h1>

    <p class="message" th:if="${param.registered}">Registration complete. Please sign in.</p>
    <p class="message" th:if="${param.logout}">You have signed out.</p>
    <p class="message error" th:if="${param.error}">Invalid username or password.</p>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Sign in</button>
        <a class="button" th:href="${continueUrl != null} ? @{/register(continue=${continueUrl})} : @{/register}">Register</a>
        <a class="button" th:href="${frontendBaseUrl}">Back</a>
    </form>
</main>
</body>
</html>
